<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Form.css">
</head>
<body>
    <div class="page">
        <header class="hero">
            <p class="eyebrow">DEV BHOOMI UTTRAKHAND UNIVERSITY</p>
            <h1>Student Registration Form</h1>
            <p class="lede">Share your details to reserve your seat. All fields are required unless marked optional.</p>
        </header>

        <section class="card">
            <h2>Registration Details</h2>
            <form action="/submit" method="post" class="form-grid">
                <div class="form-group">
                    <label for="name">Student Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter full name" required>
                </div>

                <div class="form-group">
                    <label for="roll">Admission Number</label>
                    <input type="text" id="roll" name="roll" placeholder="e.g., 23CS1234" required>
                </div>

                <div class="form-group">
                    <label for="course">Course Name</label>
                    <select id="course" name="course" required>
                        <option value="">Select course</option>
                        <option value="BCA">BCA</option>
                        <option value="MCA">MCA</option>
                        <option value="BTech CSE">BTech CSE</option>
                        <option value="MTech CSE">MTech CSE</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="">Select gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label>Subjects</label>
                    <div class="chip-group">
                        <label class="chip"><input type="checkbox" name="subject" value="DBMS"> DBMS</label>
                        <label class="chip"><input type="checkbox" name="subject" value="Server Side Programming"> Server Side Programming</label>
                        <label class="chip"><input type="checkbox" name="subject" value="UHV"> UHV</label>
                        <label class="chip"><input type="checkbox" name="subject" value="Theory of Automata"> Theory of Automata</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="name@college.edu" required>
                </div>

                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob" required>
                </div>

                <div class="form-group">
                    <label for="contact">Contact Number</label>
                    <input type="tel" id="contact" name="contact" placeholder="+91 98765 43210" pattern="\+?\d[\d\s-]{8,}" required>
                </div>

                <div class="form-actions full-width">
                    <button type="submit" class="primary">Submit Registration</button>
                    <button type="reset" class="ghost">Clear</button>
                </div>
            </form>
        </section>
    </div>
    <script src="Form.js" defer></script>
</body>
</html>
