<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <link rel="stylesheet" href="Form.css">
</head>
<body>
    <main class="wrap">
        <u><b><h1>Student Registration Form</h1></b></u><br><br>

        <form action="/submit" method="post" class="grid">
            <label class="field">
                <span>Student Name</span>
                <input type="text" id="name" name="name" placeholder="Enter full name" required>
            </label>

            <label class="field">
                <span>Admission Number</span>
                <input type="text" id="roll" name="roll" placeholder="e.g., 24CSE1234" required>
            </label>

            <label class="field">
                <span>Course Name</span>
                <select id="course" name="course" required>
                    <option value="">Select course</option>
                    <option value="BCA">BCA</option>
                    <option value="MCA">MCA</option>
                    <option value="BTech CSE">BTech CSE</option>
                    <option value="MTech CSE">MTech CSE</option>
                </select>
            </label>

            <label class="field">
                <span>Gender</span>
                <div class="radio-row">
                    <label><input type="radio" id="male" name="gender" value="Male" required> Male</label>
                    <label><input type="radio" id="female" name="gender" value="Female" required> Female</label>
                    <label><input type="radio" id="other" name="gender" value="Other" required> Other</label>
                </div>
            </label>

            <div class="field subjects">
                <span>Subjects</span>
                <div class="options">
                    <label><input type="checkbox" name="subject" value="DBMS" required> DBMS</label>
                    <label><input type="checkbox" name="subject" value="Server Side Programming"> Server Side Programming</label>
                    <label><input type="checkbox" name="subject" value="UHV"> UHV</label>
                    <label><input type="checkbox" name="subject" value="Theory of Automata"> Theory of Automata</label>
                </div>
            </div>

            <label class="field">
                <span>Email</span>
                <input type="email" id="email" name="email" placeholder="name@college.edu" required>
            </label>

            <label class="field">
                <span>Date of Birth</span>
                <input type="date" id="dob" name="dob" required>
            </label>

            <label class="field">
                <span>Contact Number</span>
                <input type="tel" id="contact" name="contact" placeholder="+91 98765 43210" pattern="\+?\d[\d\s-]{8,}" required>
            </label>  

            <div class="actions">
                <button type="submit" class="primary">Submit</button>
                <button type="reset" class="ghost">Clear</button>
            </div>
        </form>
    </main>
</body>
</html>
